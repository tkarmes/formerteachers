<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Employer Dashboard')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5 pb-5">
        <div class="row">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold"><i class="fas fa-chalkboard-teacher me-2 text-primary"></i>Employer Dashboard</h2>
                    <a href="/jobs/create" class="btn btn-primary shadow-sm">
                        <i class="fas fa-plus me-1"></i> Post a New Job
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-dark text-white">
                                    <tr>
                                        <th class="ps-4">Job Title</th>
                                        <th>Status</th>
                                        <th>Posted Date</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="job : ${jobs}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${job.title}">Job Title</div>
                                            <small class="text-muted" th:text="${job.category}">Category</small>
                                        </td>
                                        <td>
                                            <span th:if="${job.approved}" class="badge rounded-pill bg-success-subtle text-success border border-success px-3">
                                                <i class="fas fa-check-circle me-1"></i> Active
                                            </span>
                                            <span th:unless="${job.approved}" class="badge rounded-pill bg-warning-subtle text-warning-emphasis border border-warning px-3">
                                                <i class="fas fa-clock me-1"></i> Pending Approval
                                            </span>
                                        </td>
                                        <td th:text="${job.postedDate}">Date</td>
                                        <td class="text-end pe-4">
                                            <div class="btn-group shadow-sm">
                                                <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary" title="View Details">
                                                    <i class="fas fa-eye"></i> View
                                                </a>
                                                <a th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-sm btn-outline-secondary" title="Edit Job">
                                                    <i class="fas fa-edit"></i> Edit
                                                </a>
                                                <a th:href="@{/jobs/delete/{id}(id=${job.id})}" 
                                                   class="btn btn-sm btn-outline-danger" 
                                                   onclick="return confirm('Are you sure you want to delete this job posting? This cannot be undone.')"
                                                   title="Delete Job">
                                                    <i class="fas fa-trash-alt"></i> Delete
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(jobs)}">
                                        <td colspan="4" class="text-center py-5">
                                            <div class="mb-3">
                                                <i class="fas fa-clipboard-list fa-3x text-muted opacity-25"></i>
                                            </div>
                                            <h5 class="text-muted">You haven't posted any jobs yet.</h5>
                                            <p class="text-secondary small">Start by clicking the "Post a New Job" button above.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
