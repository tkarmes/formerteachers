<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job - FormerTeachers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- IMPORT NAVBAR -->
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="container">
    <div class="form-box">
        <h1 style="text-align: center; margin-bottom: 30px;">Edit Job</h1>


        <form th:action="@{/jobs/admin/jobs/update/{id}(id=${job.id})}" th:object="${job}" method="post">
            <div class="form-group">
                <label for="title">Job Title *</label>
                <input type="text" id="title" th:field="*{title}" class="form-control" required />
                <span style="color:red;" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>

            <div class="form-group">
                <label for="company">Company *</label>
                <input type="text" id="company" th:field="*{company}" class="form-control" required />
                <span style="color:red;" th:if="${#fields.hasErrors('company')}" th:errors="*{company}"></span>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" th:field="*{location}" class="form-control" />
            </div>

            <div class="form-group">
                <label for="salaryRange">Salary Range</label>
                <input type="text" id="salaryRange" th:field="*{salaryRange}" class="form-control" />
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" th:field="*{category}" class="form-control" required>
                    <option value="">Select a category...</option>
                    <option value="Instructional Design">Instructional Design</option>
                    <option value="Learning & Development">Learning & Development</option>
                    <option value="Corporate Training">Corporate Training</option>
                    <option value="Curriculum Development">Curriculum Development</option>
                    <option value="Customer Education">Customer Education / Success</option>
                    <option value="EdTech">EdTech (Sales, Support, Product)</option>
                    <option value="Talent Development">Talent Development</option>
                    <option value="eLearning">eLearning Specialist</option>
                    <option value="Other">Other (please specify in description)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="workType">Work Type</label>
                <select id="workType" th:field="*{workType}" class="form-control">
                    <option value="">Select...</option>
                    <option value="Full Time">Full Time</option>
                    <option value="Part Time">Part Time</option>
                    <option value="Contract">Contract</option>
                    <option value="Remote">Remote Only</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>

            <div class="form-group">
                <label for="applyInfo">How to Apply</label>
                <input type="text" id="applyInfo" th:field="*{applyInfo}" class="form-control" />
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" th:field="*{description}" class="form-control" required style="min-height: 150px;"></textarea>
                <span style="color:red;" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>

            <button type="submit" class="cta-btn btn-submit">Save Changes</button>
        </form>

        <div style="text-align: center;">
            <a href="/jobs/admin" class="back-link">← Cancel</a>
        </div>
    </div>
</div>

<!-- IMPORT FOOTER -->
<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
