<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common :: head(title=${job.title})}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/common :: navbar}"></nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <h1 class="fw-bold mb-1" th:text="${job.title}">Job Title</h1>
                        <div class="d-flex align-items-center mb-3">
                            <h4 class="text-secondary mb-0 me-3" th:text="${job.company}">Company Name</h4>
                            <a th:if="${job.employer != null and job.employer.website != null}" 
                               th:href="${job.employer.website}" 
                               target="_blank" 
                               class="btn btn-sm btn-outline-primary py-0">Visit Website</a>
                        </div>

                        <div class="d-flex flex-wrap gap-3 text-muted">
                            <span>📍 <span th:text="${job.location ?: 'Remote'}"></span></span>
                            <span>💰 <span th:text="${job.salaryRange ?: 'Competitive'}"></span></span>
                            <span>🏷️ <span th:text="${job.category}"></span></span>
                            <span>⏰ <span th:text="${job.workType}"></span></span>
                            <span>📅 Posted <span th:text="${job.postedDate}"></span></span>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="job-description mb-5">
                        <h4 class="fw-bold mb-3">Job Description</h4>
                        <div class="description-content lh-lg" th:utext="${job.description}">
                            Job description here.
                        </div>
                    </div>

                    <!-- Apply Section -->
                    <div class="p-4 bg-white border rounded shadow-sm">
                        <h4 class="fw-bold mb-3">How to Apply</h4>
                        <div th:if="${job.applyInfo != null and #strings.length(job.applyInfo) > 0}">
                            <div th:if="${#strings.startsWith(job.applyInfo, 'http')}">
                                <a th:href="${job.applyInfo}" target="_blank" class="btn btn-lg btn-primary w-100 mb-2">Apply Now</a>
                                <p class="text-center text-muted small mt-2 mb-0">You will be redirected to the company's application page.</p>
                            </div>
                            <div th:unless="${#strings.startsWith(job.applyInfo, 'http')}">
                                <p class="lead mb-0" th:text="${job.applyInfo}"></p>
                            </div>
                        </div>
                        <div th:if="${job.applyInfo == null or #strings.isEmpty(job.applyInfo)}">
                            <p class="mb-0">Contact the company directly for application instructions.</p>
                        </div>
                    </div>

                    <div class="mt-5 text-center">
                        <a href="/jobs" class="text-decoration-none fw-bold">← Back to Job Listings</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/common :: footer}"></footer>

</body>
</html>
