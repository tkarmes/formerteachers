<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Oops! Something went wrong - FormerTeachers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: var(--bus-yellow);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 var(--bus-black);
        }
        .error-message {
            font-size: 24px;
            color: var(--bus-black);
            margin-bottom: 30px;
            max-width: 600px;
        }
        .bus-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="error-container">
    <div class="bus-icon">🚌💨</div>
    
    <div class="error-code" th:text="${status} ?: '404'">404</div>
    
    <div class="error-message">
        <h2 th:text="${error} ?: 'Page Not Found'">Page Not Found</h2>
        <p th:text="${message} ?: 'The bus stop you represent looking for doesn\'t exist. Let\'s get you back on route!'">
            The bus stop you are looking for doesn't exist. Let's get you back on route!
        </p>
    </div>

    <a href="/" class="cta-btn">Back to Home</a>
</div>

<!-- Footer -->
<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
