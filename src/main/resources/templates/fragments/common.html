<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Former Teachers Job Board'">Former Teachers Job Board</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <nav th:fragment="navbar" class="navbar">
        <div class="nav-container">
            <a class="logo" href="/">🍎 FormerTeachers</a>
            
            <div class="nav-links">
                <a href="/jobs">Browse Jobs</a>
                
                <!-- Employer specific -->
                <a sec:authorize="hasRole('EMPLOYER')" href="/jobs/dashboard" style="color: var(--bus-yellow);">Employer Dashboard</a>
                
                <!-- Admin specific -->
                <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" style="color: #ff5722;">Admin Dashboard</a>

                <a sec:authorize="hasAnyRole('EMPLOYER', 'ADMIN')" href="/jobs/create" class="post-job">Post a Job</a>

                <!-- Auth links -->
                <a sec:authorize="!isAuthenticated()" href="/login">Login</a>
                
                <span sec:authorize="isAuthenticated()" style="display: inline-flex; align-items: center;">
                    <span style="color: white; margin-left: 20px; opacity: 0.8; font-size: 0.9rem;">
                        Hi, <span sec:authentication="name">User</span>
                    </span>
                    <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                        <button type="submit" class="logout-btn">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer">
        <div class="container">
            <p>&copy; 2024 Former Teachers Job Board</p>
            <p style="font-size: 0.8rem; opacity: 0.7;">Empowering educators to find their next chapter.</p>
        </div>
    </footer>

</body>
</html>
