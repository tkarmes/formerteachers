<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Registration - FormerTeachers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:replace="~{fragments/common :: navbar}"></div>

<div class="form-box shadow-sm" style="margin: 40px auto; max-width: 650px;">
    <h2 style="text-align: center; margin-bottom: 20px; color: var(--bus-black); text-transform: uppercase;">Employer Registration</h2>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Connect with former teachers and educational professionals.</p>

    <form th:action="@{/employer-signup}" th:object="${employerDto}" method="post" autocomplete="off">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="username">Email Address (Username)</label>
                <input type="email" id="username" th:field="*{username}" class="form-control" placeholder="example@company.com" required autocomplete="username">
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters" required autocomplete="new-password">
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
        </div>

        <div style="margin: 30px 0; border-top: 2px solid var(--bus-yellow); padding-top: 20px;">
            <h3 style="margin-bottom: 20px; color: var(--chalkboard-green);">Company Details</h3>
        </div>

        <div class="form-group">
            <label for="companyName">Company Name</label>
            <input type="text" id="companyName" th:field="*{companyName}" class="form-control" placeholder="ACME Inc." required>
            <div class="error" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
        </div>

        <div class="form-group">
            <label for="website">Company Website</label>
            <input type="text" id="website" th:field="*{website}" class="form-control" placeholder="www.example.com (optional)">
            <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">Example: www.google.com</p>
        </div>

        <div class="form-group">
            <label for="companyDescription">Company Description</label>
            <textarea id="companyDescription" th:field="*{companyDescription}" class="form-control" rows="4" placeholder="Briefly describe your company..."></textarea>
        </div>

        <button type="submit" class="cta-btn btn-submit" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Create Employer Account</button>
    </form>

    <div style="text-align: center; margin-top: 30px;">
        <p>Already have an account? <a th:href="@{/login}" style="color: var(--chalkboard-green); text-decoration: none; font-weight: bold;">Login here</a></p>
    </div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
