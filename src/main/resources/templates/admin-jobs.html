<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Manage Jobs</title>
  <style>
    body { font-family: Arial; margin:0; background:#f8f9fa; }
    .container { max-width:1000px; margin:40px auto; padding:20px; background:white; border-radius:10px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; text-align:left; border-bottom:1px solid #ddd; }
    th { background:#1a3c5e; color:white; }
    .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; text-decoration:none; }
    .btn-edit { background:#2196F3; color:white; }
    .btn-delete { background:#f44336; color:white; }
  </style>
</head>
<body>

<div class="container">
  <h1>Admin - Manage Jobs</h1>
  <a href="/jobs" class="btn" style="background:#4CAF50; color:white; padding:8px 16px;">← Back to Public Site</a>

  <table>
    <tr>
      <th>Title</th>
      <th>Company</th>
      <th>Category</th>
      <th>Posted</th>
      <th>Actions</th>
    </tr>
    <tr th:each="job : ${jobs}">
      <td th:text="${job.title}"></td>
      <td th:text="${job.company}"></td>
      <td th:text="${job.category}"></td>
      <td th:text="${job.postedDate}"></td>
      <td>
        <a th:href="@{/jobs/admin/jobs/{id}/edit(id=${job.id})}" class="btn btn-edit">Edit</a>
        <form th:action="@{/jobs/admin/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-delete" onclick="return confirm('Delete this job?')">Delete</button>
        </form>
      </td>
    </tr>
  </table>
</div>

</body>
</html>
