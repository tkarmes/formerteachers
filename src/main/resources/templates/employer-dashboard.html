<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Employer Dashboard')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Employer Dashboard</h2>
                    <a href="/jobs/create" class="btn btn-primary">Post a New Job</a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Job Title</th>
                                    <th>Status</th>
                                    <th>Posted Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td th:text="${job.title}">Job Title</td>
                                    <td>
                                        <span th:if="${job.approved}" class="badge bg-success">Active</span>
                                        <span th:unless="${job.approved}" class="badge bg-warning text-dark">Pending Approval</span>
                                    </td>
                                    <td th:text="${job.postedDate}">Date</td>
                                    <td>
                                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-info text-white">View</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jobs)}">
                                    <td colspan="4" class="text-center py-4 text-muted">You haven't posted any jobs yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
