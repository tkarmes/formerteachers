<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Jobs</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        /* Admin-specific styles */
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 1.8rem;
        }
        .admin-search-box {
            width: 100%;
            max-width: 380px;
            margin-bottom: 20px;
        }
        .admin-search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: var(--bus-black);
            color: var(--white);
        }
        tr:hover {
            background: #f8f9fa;
        }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            margin-right: 6px;
        }
        .btn-edit { background: #2196F3; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .btn-back { background: var(--chalkboard-green); color: white; padding: 10px 18px; }
    </style>
</head>

<body>

<!-- IMPORT NAVBAR -->
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="admin-container">
    <div class="admin-header">
        <h1>Manage Jobs (<span th:text="${jobs.size()}"></span> total)</h1>
        <a href="/jobs" class="btn btn-back">← Public Site</a>
    </div>

    <div class="admin-search-box">
        <input type="text" id="adminSearch" placeholder="Search by title, company, or category..." onkeyup="filterTable()">
    </div>

    <table id="jobsTable">
        <thead>
        <tr>
            <th>Title</th>
            <th>Company</th>
            <th>Category</th>
            <th>Posted</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="job : ${jobs}">
            <td th:text="${job.title}"></td>
            <td th:text="${job.company}"></td>
            <td th:text="${job.category}"></td>
            <td>
                <span th:text="${job.postedDate}"></span>
                <span th:if="${job.postedDate.contains('today')}" class="new-badge">New</span>
            </td>
            <td>
                <a th:href="@{/jobs/admin/jobs/{id}/edit(id=${job.id})}" class="btn btn-edit">Edit</a>
                <form th:action="@{/jobs/admin/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-delete" onclick="return confirm('Are you sure?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${jobs.isEmpty()}" style="text-align: center; padding: 60px; color: #777; font-size: 18px;">
        <p>No jobs found.</p>
    </div>

</div>

<!-- IMPORT FOOTER (Optional for admin, but good for consistency) -->
<div th:replace="~{fragments/common :: footer}"></div>

<script>
    function filterTable() {
        const input = document.getElementById("adminSearch").value.toLowerCase();
        const rows = document.querySelectorAll("#jobsTable tbody tr");
        rows.forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>

</body>
</html>
