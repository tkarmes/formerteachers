<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Edit Company Profile')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                                <i class="fas fa-edit fa-2x"></i>
                            </div>
                            <h2 class="fw-bold">Edit Company Profile</h2>
                            <p class="text-muted">Tell teachers what makes your school or company a great place to work!</p>
                        </div>

                        <form th:action="@{/employer/profile/edit}" th:object="${profile}" method="post">
                            <div class="mb-4">
                                <label for="companyName" class="form-label fw-bold">Company Name</label>
                                <input type="text" class="form-control form-control-lg border-0 bg-light shadow-none" 
                                       id="companyName" th:field="*{companyName}" required>
                            </div>

                            <div class="mb-4">
                                <label for="website" class="form-label fw-bold">Website URL (Optional)</label>
                                <input type="text" class="form-control border-0 bg-light shadow-none" 
                                       id="website" th:field="*{website}" placeholder="e.g. www.yourcompany.com">
                                <div class="form-text">Your school or company website.</div>
                            </div>

                            <div class="mb-4">
                                <label for="logoUrl" class="form-label fw-bold">Logo URL (Optional)</label>
                                <input type="text" class="form-control border-0 bg-light shadow-none" 
                                       id="logoUrl" th:field="*{logoUrl}" placeholder="https://example.com/logo.png">
                                <div class="form-text">Paste a link to your company logo image.</div>
                            </div>

                            <div class="mb-4">
                                <label for="companyDescription" class="form-label fw-bold">About Us</label>
                                <textarea class="form-control border-0 bg-light shadow-none" 
                                          id="companyDescription" th:field="*{companyDescription}" 
                                          rows="6" placeholder="Share your mission, values, and why a former teacher would be a perfect fit..."></textarea>
                            </div>

                            <div class="d-grid gap-2 mt-5">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                    <i class="fas fa-save me-1"></i> Save Profile Changes
                                </button>
                                <a href="/jobs/dashboard" class="btn btn-link text-decoration-none text-muted">Cancel and go back</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
