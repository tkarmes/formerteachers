# Server settings
server.port=8080

# Disable Thymeleaf template caching during dev (auto-reload changes)
spring.thymeleaf.cache=false

# PostgreSQL connection (your DB name is formerteachersdb)
spring.datasource.url=jdbc:postgresql://localhost:5432/formerteachersdb
spring.datasource.username=postgres
spring.datasource.password=postgres1

# JPA / Hibernate settings (creates/updates tables automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true                # Optional: shows SQL queries in console
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect