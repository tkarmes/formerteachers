<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Post a Job')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="fw-bold mb-4">Post a New Job</h2>
                        <p class="text-muted mb-4">Share an opportunity with our community of talented former educators.</p>
                        
                        <form th:action="@{/jobs/create}" th:object="${job}" method="post">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Job Title</label>
                                    <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Learning Experience Designer" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Company Name</label>
                                    <input type="text" th:field="*{company}" class="form-control" placeholder="Your Company Name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Location</label>
                                    <input type="text" th:field="*{location}" class="form-control" placeholder="e.g. Remote, Austin TX">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Category</label>
                                    <select th:field="*{category}" class="form-select" required>
                                        <option value="">Select Category</option>
                                        <option value="EdTech">EdTech</option>
                                        <option value="Curriculum">Curriculum Design</option>
                                        <option value="Corporate">Corporate Training</option>
                                        <option value="Sales/Success">Sales & Customer Success</option>
                                        <option value="Operations">Operations/Admin</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Work Type</label>
                                    <select th:field="*{workType}" class="form-select">
                                        <option value="Full-time">Full-time</option>
                                        <option value="Part-time">Part-time</option>
                                        <option value="Contract">Contract</option>
                                        <option value="Freelance">Freelance</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Salary Range</label>
                                    <input type="text" th:field="*{salaryRange}" class="form-control" placeholder="e.g. $70k - $90k">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Job Description</label>
                                    <textarea th:field="*{description}" class="form-control" rows="6" placeholder="Describe the role, responsibilities, and why a former teacher would be a great fit..." required></textarea>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">How to Apply</label>
                                    <input type="text" th:field="*{applyInfo}" class="form-control" placeholder="Email address or link to application page" required>
                                </div>
                                <div class="col-md-12 mt-4">
                                    <button type="submit" class="btn btn-primary btn-lg w-100">Submit Job for Approval</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
