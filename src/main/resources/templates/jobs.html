<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <title>Job Listings</title>

  <style>

    body{
    font-family:Arial;
    margin:0;
    background:#f5f7fb;
    }

    /* NAVBAR */

    .navbar{
    background:#1a3c5e;
    padding:15px 0;
    margin-bottom:30px;
    }

    .nav-container{
    max-width:1000px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    }

    .logo{
    color:white;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    }

    .nav-links a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    }

    .post-job{
    background:#4CAF50;
    padding:6px 12px;
    border-radius:5px;
    }

    /* PAGE */

    h1{
    text-align:center;
    }

    .search-bar{
    max-width:900px;
    margin:20px auto;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    }

    .search-bar input,
    .search-bar select,
    .search-bar button{
    padding:8px 12px;
    border-radius:5px;
    border:1px solid #ccc;
    }

    .search-bar button{
    background:#4CAF50;
    color:white;
    border:none;
    }

    .job-container{
    max-width:900px;
    margin:auto;
    }

    .job-card{
    display:block;
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-decoration:none;
    color:black;
    }

    .job-card:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    }

    .company{
    font-weight:bold;
    margin-bottom:8px;
    }

    .pagination{
    text-align:center;
    margin-top:30px;
    }

    .create-job{
    text-align:center;
    margin-top:20px;
    }

    .pagination{
text-align:center;
margin-top:30px;
font-size:16px;
}

.pagination a{
margin:0 10px;
text-decoration:none;
color:#1a3c5e;
font-weight:bold;
}

  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
  <div class="nav-container">

    <a href="/" class="logo">
      FormerTeachers
    </a>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/jobs">Browse Jobs</a>
      <a href="/jobs/new" class="post-job">Post a Job</a>
    </div>

  </div>
</nav>

<h1>Browse Jobs for Former Teachers</h1>

<!-- SEARCH -->

<form class="search-bar" th:action="@{/jobs}" method="get">

  <input type="text" name="keyword" placeholder="Keyword" th:value="${keyword}">
  <input type="text" name="location" placeholder="Location" th:value="${location}">
  <input type="text" name="category" placeholder="Category" th:value="${category}">

  <select name="workType">
    <option value="">All Work Types</option>
    <option value="Full Time">Full Time</option>
    <option value="Part Time">Part Time</option>
    <option value="Contract">Contract</option>
    <option value="Remote">Remote</option>
  </select>

  <button type="submit">Search</button>

</form>

<!-- JOBS -->

<div class="job-container">

  <a class="job-card"
     th:each="job : ${jobs.content}"
     th:href="@{/jobs/{id}(id=${job.id})}">

    <h2 th:text="${job.title}"></h2>

    <p class="company" th:text="${job.company}"></p>

    <p><strong>Location:</strong> <span th:text="${job.location}"></span></p>

    <p><strong>Salary:</strong> <span th:text="${job.salaryRange}"></span></p>

    <p><strong>Work Type:</strong> <span th:text="${job.workType}"></span></p>

  </a>

</div>

<!-- PAGINATION -->

<div class="pagination">

  <a th:if="${jobs.hasPrevious()}"
     th:href="@{/jobs(page=${jobs.number - 1},
                     keyword=${keyword},
                     location=${location},
                     category=${category},
                     workType=${workType})}">
    ← Previous
  </a>

  <span style="margin:0 10px;">
    Page <span th:text="${jobs.number + 1}"></span>
    of <span th:text="${jobs.totalPages}"></span>
  </span>

  <a th:if="${jobs.hasNext()}"
     th:href="@{/jobs(page=${jobs.number + 1},
                     keyword=${keyword},
                     location=${location},
                     category=${category},
                     workType=${workType})}">
    Next →
  </a>

</div>

<!-- CREATE -->

<div class="create-job">

  <a href="/jobs/new">Create New Job</a>

</div>

</body>
</html>
