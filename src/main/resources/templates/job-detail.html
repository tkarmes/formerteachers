<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${job.title} + ' - FormerTeachers'">Job Detail</title>
    <!-- CSS same as above -->
</head>
<body>

<!-- Navbar -->
<nav class="navbar"> <!-- same --> </nav>

<div class="container">
    <h1 th:text="${job.title}">Job Title</h1>

    <p><strong>Company:</strong> <span th:text="${job.company}"></span></p>
    <p><strong>Location:</strong> <span th:text="${job.location ?: 'Not Specified'}"></span></p>
    <p><strong>Salary Range:</strong> <span th:text="${job.salaryRange ?: 'Not Specified'}"></span></p>
    <p><strong>Category:</strong> <span th:text="${job.category ?: 'Not Specified'}"></span></p>
    <p><strong>Work Type:</strong> <span th:text="${job.workType ?: 'Not Specified'}"></span></p>

    <hr>

    <h2>Description</h2>
    <div th:utext="${job.description ?: '(No description provided)'}"></div>

    <div style="margin-top:40px; text-align:center;">
        <a href="/jobs">← Back to Browse Jobs</a>
    </div>
</div>

</body>
</html>
