<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FormerTeachers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- IMPORT NAVBAR -->
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="container" style="max-width: 500px; margin: 50px auto;">
    <div class="form-box">
        <h2 style="text-align: center; margin-bottom: 20px;">Admin Login</h2>

        <div th:if="${param.error}" class="error" style="color: red; margin-bottom: 15px; text-align: center;">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="success" style="color: green; margin-bottom: 15px; text-align: center;">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="cta-btn btn-submit" style="width: 100%;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            <a href="/" style="color: var(--chalkboard-green);">Back to Home</a>
        </p>
    </div>
</div>

<!-- IMPORT FOOTER -->
<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
