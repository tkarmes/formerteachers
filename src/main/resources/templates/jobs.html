<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Job Listings')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5">
        <h2 class="mb-4">Available Roles for Educators</h2>
        
        <div class="row">
            <div th:each="job : ${jobs}" class="col-md-6 mb-4">
                <div class="card h-100 shadow-sm border-0 job-card">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title fw-bold mb-0" th:text="${job.title}">Job Title</h5>
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle" th:text="${job.workType}">Work Type</span>
                        </div>
                        <h6 class="card-subtitle mb-3 text-secondary" th:text="${job.company}">Company</h6>
                        
                        <div class="mb-3">
                            <span class="me-3 text-muted small">📍 <span th:text="${job.location ?: 'Remote'}"></span></span>
                            <span class="text-muted small">💰 <span th:text="${job.salaryRange ?: 'Competitive'}"></span></span>
                        </div>
                        
                        <p class="card-text text-truncate-3" th:text="${#strings.abbreviate(job.description, 150)}"></p>
                        
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <small class="text-muted" th:text="'Posted ' + ${job.postedDate}">Date</small>
                            <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline-primary btn-sm px-4">Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${currentPage - 1})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/jobs(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
