<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FormerTeachers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/common :: navbar}"></div>

<div class="container" style="max-width: 500px; margin: 50px auto;">
    <div class="form-box shadow-sm p-4 rounded bg-white">
        <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>

        <div th:if="${param.error}" class="error" style="color: red; margin-bottom: 15px; text-align: center;">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="success" style="color: green; margin-bottom: 15px; text-align: center;">
            You have been logged out.
        </div>
        <div th:if="${param.employerRegistered}" class="success" style="color: var(--chalkboard-green); font-weight: bold; margin-bottom: 15px; text-align: center;">
            Registration successful! Please log in below.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group mb-3">
                <label for="username">Email Address</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>

            <div class="form-group mb-4">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="cta-btn btn-submit" style="width: 100%;">Sign In</button>
        </form>

        <hr class="my-4">
        
        <div class="text-center">
            <p class="mb-2">Are you an employer?</p>
            <a th:href="@{/employer-signup}" class="cta-btn secondary-btn" style="text-decoration: none; padding: 10px 20px; font-weight: bold; font-size: 0.9em;">Create Employer Account</a>
        </div>

        <p style="text-align: center; margin-top: 25px;">
            <a href="/" style="color: var(--chalkboard-green); text-decoration: none;">&larr; Back to Home</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
