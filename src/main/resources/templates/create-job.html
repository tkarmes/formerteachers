<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Post a Job</title>
</head>
<body>

<h1>Post a Job</h1>

<form th:action="@{/jobs}" th:object="${job}" method="post">
  <label>Title:</label>
  <input type="text" th:field="*{title}" /><br><br>

  <label>Company:</label>
  <input type="text" th:field="*{company}" /><br><br>

  <label>Location:</label>
  <input type="text" th:field="*{location}" /><br><br>

  <label>Salary Range:</label>
  <input type="text" th:field="*{salaryRange}" /><br><br>

  <label>Description:</label><br>
  <textarea th:field="*{description}"></textarea><br><br>

  <button type="submit">Submit Job</button>
</form>

<a href="/">Back to Home</a>

</body>
</html>
