<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Admin Dashboard')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <div class="container mt-5 pb-5">
        <div class="row">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold"><i class="fas fa-user-shield me-2 text-primary"></i>Admin Approval Queue</h2>
                    <span class="badge bg-primary rounded-pill px-3 shadow-sm" th:text="${#lists.size(pendingJobs) + ' Pending'}">0 Pending</span>
                </div>

                <!-- Alert Messages -->
                <div th:if="${param.approved}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                    <i class="fas fa-check-circle me-2"></i> Job approved successfully! The employer has been notified.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${param.deleted}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                    <i class="fas fa-trash-alt me-2"></i> Job posting has been rejected and removed.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-dark text-white">
                                    <tr>
                                        <th class="ps-4">Job Title</th>
                                        <th>Employer</th>
                                        <th>Submitted On</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="job : ${pendingJobs}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${job.title}">Job Title</div>
                                            <small class="text-muted" th:text="${job.category}">Category</small>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-building text-muted me-2 small"></i>
                                                <span th:text="${job.employer != null ? job.employer.companyName : 'Self-Posted'}">Company</span>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="text-secondary small">
                                                <i class="far fa-calendar-alt me-1"></i>
                                                <span th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}">Date</span>
                                            </span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <div class="d-flex justify-content-end gap-2">
                                                <form th:action="@{/admin/approve/{id}(id=${job.id})}" method="post">
                                                    <button type="submit" class="btn btn-sm btn-success shadow-sm px-3">
                                                        <i class="fas fa-check me-1"></i> Approve
                                                    </button>
                                                </form>
                                                <form th:action="@{/admin/delete/{id}(id=${job.id})}" method="post" 
                                                      onsubmit="return confirm('Are you sure you want to REJECT and DELETE this job posting?')">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger shadow-sm">
                                                        <i class="fas fa-times me-1"></i> Reject
                                                    </button>
                                                </form>
                                                <a th:href="@{/jobs/{id}(id=${job.id})}" target="_blank" class="btn btn-sm btn-outline-secondary shadow-sm" title="Preview">
                                                    <i class="fas fa-external-link-alt"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(pendingJobs)}">
                                        <td colspan="4" class="text-center py-5">
                                            <div class="mb-3">
                                                <i class="fas fa-check-double fa-3x text-success opacity-25"></i>
                                            </div>
                                            <h5 class="text-muted">Review Queue Empty</h5>
                                            <p class="text-secondary small mb-0">You're all caught up! No jobs are currently pending approval.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
