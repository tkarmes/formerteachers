<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <title>Job Listings</title>

  <style>

    body{
    font-family:Arial;
    margin:0;
    background:#f5f7fb;
    }

    /* NAVBAR */

    .navbar{
    background:#1a3c5e;
    padding:15px 0;
    margin-bottom:30px;
    }

    .nav-container{
    max-width:1000px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    }

    .logo{
    color:white;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    }

    .nav-links a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    }

    .post-job{
    background:#4CAF50;
    padding:6px 12px;
    border-radius:5px;
    }

    /* PAGE */

    h1{
    text-align:center;
    margin-bottom:5px;
    }

    .job-count{
    text-align:center;
    color:#666;
    margin-bottom:20px;
    }

    /* SEARCH */

    .search-bar{
    max-width:900px;
    margin:20px auto;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    }

    .search-bar input,
    .search-bar select{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    }

    .search-bar button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    }

    /* JOB LIST */

    .job-container{
    max-width:900px;
    margin:auto;
    }

    .job-card{
    display:block;
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-decoration:none;
    color:black;
    transition:all .15s ease;
    }

    .job-card:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }

    .job-title{
    font-size:20px;
    margin-bottom:6px;
    }

    .company{
    font-weight:bold;
    color:#444;
    margin-bottom:10px;
    }

    .job-meta{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    font-size:14px;
    color:#555;
    }

    /* TAGS */

    .tag{
    background:#eef3ff;
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
    font-weight:bold;
    }

    /* PAGINATION */

    .pagination{
    text-align:center;
    margin-top:30px;
    font-size:16px;
    }

    .pagination a{
    margin:0 10px;
    text-decoration:none;
    color:#1a3c5e;
    font-weight:bold;
    }

    /* CREATE */

    .create-job{
    text-align:center;
    margin-top:20px;
    }

  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
  <div class="nav-container">

    <a href="/" class="logo">
      FormerTeachers
    </a>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/jobs">Browse Jobs</a>
      <a href="/jobs/new" class="post-job">Post a Job</a>
    </div>

  </div>
</nav>

<h1>Browse Jobs for Former Teachers</h1>

<!-- Success message after posting -->
<div th:if="${successMessage}"
     style="background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin: 20px auto; max-width: 900px; text-align: center; border: 1px solid #c3e6cb;">
  <strong th:text="${successMessage}"></strong>
</div>

<p class="job-count">
  <span th:text="${jobs.totalElements}"></span> jobs found
</p>

<!-- SEARCH -->

<form class="search-bar" th:action="@{/jobs}" method="get">

  <input type="text" name="keyword" placeholder="Keyword" th:value="${keyword}">
  <input type="text" name="location" placeholder="Location" th:value="${location}">
  <input type="text" name="category" placeholder="Category" th:value="${category}">

  <select name="workType">
    <option value="">All Work Types</option>
    <option value="Full Time">Full Time</option>
    <option value="Part Time">Part Time</option>
    <option value="Contract">Contract</option>
    <option value="Remote">Remote</option>
  </select>

  <button type="submit">Search</button>

</form>

<!-- JOBS -->

<div class="job-container">

  <a class="job-card"
     th:each="job : ${jobs.content}"
     th:href="@{/jobs/{id}(id=${job.id})}">

    <div class="job-title" th:text="${job.title}"></div>

    <div class="company" th:text="${job.company}"></div>

    <div class="job-meta">

      <span><strong>Location:</strong> <span th:text="${job.location}"></span></span>

      <span th:if="${job.salaryRange != null}">
<strong>Salary:</strong>
<span th:text="${job.salaryRange}"></span>
</span>

      <span class="tag" th:text="${job.workType}"></span>

      <span class="tag" th:text="${job.category}"></span>

    </div>

  </a>

</div>

<!-- PAGINATION -->

<div class="pagination">

  <a th:if="${jobs.hasPrevious()}"
     th:href="@{/jobs(page=${jobs.number - 1},
keyword=${keyword},
location=${location},
category=${category},
workType=${workType})}">
    ← Previous
  </a>

  <span style="margin:0 10px;">
Page <span th:text="${jobs.number + 1}"></span>
of <span th:text="${jobs.totalPages}"></span>
</span>

  <a th:if="${jobs.hasNext()}"
     th:href="@{/jobs(page=${jobs.number + 1},
keyword=${keyword},
location=${location},
category=${category},
workType=${workType})}">
    Next →
  </a>

</div>

<div class="create-job">
  <a href="/jobs/new">Create New Job</a>
</div>

</body>
</html>
