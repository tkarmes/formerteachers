<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}"></head>
<body class="bg-light">
    <div th:replace="~{fragments/common :: nav}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Employer Registration</h2>
                        <p class="text-center text-muted mb-4">Connect with former teachers and educational professionals.</p>

                        <form th:action="@{/employer-signup}" th:object="${employerDto}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email Address (Username)</label>
                                <input type="email" th:field="*{username}" class="form-control" placeholder="example@company.com">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <hr class="my-4">
                            <h5 class="mb-3">Company Information</h5>

                            <div class="mb-3">
                                <label class="form-label">Company Name</label>
                                <input type="text" th:field="*{companyName}" class="form-control" placeholder="ACME Inc.">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Website</label>
                                <input type="url" th:field="*{website}" class="form-control" placeholder="https://example.com">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Company Description</label>
                                <textarea th:field="*{companyDescription}" class="form-control" rows="4" placeholder="Briefly describe your company..."></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Create Employer Account</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0">Already have an account? <a th:href="@{/login}">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/common :: footer}"></div>
</body>
</html>
